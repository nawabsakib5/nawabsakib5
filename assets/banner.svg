<svg width="100%" height="260" viewBox="0 0 1000 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a">
        <animate attributeName="stop-color" values="#0f172a;#111827;#0f172a" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#1e293b">
        <animate attributeName="stop-color" values="#1e293b;#312e81;#1e293b" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#0f172a">
        <animate attributeName="stop-color" values="#0f172a;#064e3b;#0f172a" dur="6s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="50%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#818cf8">
        <animate attributeName="offset" values="1;0.5;1" dur="4s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      .particle { animation: floatUp linear infinite; opacity: 0.55; }
      @keyframes floatUp {
        0%   { transform: translateY(0px); opacity: 0; }
        10%  { opacity: 0.6; }
        90%  { opacity: 0.4; }
        100% { transform: translateY(-220px); opacity: 0; }
      }
      .fadeIn { animation: fadeIn 1.4s ease-out forwards; opacity: 0; }
      @keyframes fadeIn {
        to { opacity: 1; }
      }
      .pulse { animation: pulse 2.6s ease-in-out infinite; }
      @keyframes pulse {
        0%, 100% { opacity: 0.5; }
        50% { opacity: 1; }
      }
    </style>
  </defs>

  <rect width="1000" height="260" fill="url(#bgGrad)"/>

  <!-- floating particles -->
  <circle class="particle" cx="80" cy="240" r="2.5" fill="#34d399" style="animation-duration:7s; animation-delay:0s"/>
  <circle class="particle" cx="180" cy="250" r="2" fill="#818cf8" style="animation-duration:9s; animation-delay:1s"/>
  <circle class="particle" cx="300" cy="245" r="3" fill="#34d399" style="animation-duration:6.5s; animation-delay:2s"/>
  <circle class="particle" cx="450" cy="255" r="2" fill="#818cf8" style="animation-duration:8s; animation-delay:0.5s"/>
  <circle class="particle" cx="600" cy="248" r="2.5" fill="#34d399" style="animation-duration:7.5s; animation-delay:1.5s"/>
  <circle class="particle" cx="740" cy="252" r="2" fill="#818cf8" style="animation-duration:9.5s; animation-delay:2.5s"/>
  <circle class="particle" cx="860" cy="240" r="3" fill="#34d399" style="animation-duration:6s; animation-delay:1s"/>
  <circle class="particle" cx="940" cy="250" r="2" fill="#818cf8" style="animation-duration:8.5s; animation-delay:3s"/>

  <!-- code-style accent brackets -->
  <text x="60" y="115" font-family="Fira Code, monospace" font-size="46" fill="#334155" opacity="0.7">&lt;</text>
  <text x="900" y="115" font-family="Fira Code, monospace" font-size="46" fill="#334155" opacity="0.7">/&gt;</text>

  <!-- main name -->
  <text x="500" y="120" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-weight="800"
        font-size="52" fill="url(#textGrad)" filter="url(#glow)" class="fadeIn" style="animation-delay:0.1s">
    Mohammad Sakib Howlader
  </text>

  <!-- subtitle -->
  <text x="500" y="160" text-anchor="middle" font-family="Fira Code, monospace" font-size="19"
        fill="#a5b4fc" class="fadeIn" style="animation-delay:0.6s">
    Backend Developer · Python · Django &amp; C# · SQL &amp; Database Management
  </text>

  <!-- tag row -->
  <g class="fadeIn" style="animation-delay:1.1s">
    <rect x="330" y="185" width="120" height="30" rx="15" fill="#1e293b" stroke="#34d399" stroke-width="1"/>
    <text x="390" y="205" text-anchor="middle" font-family="Fira Code, monospace" font-size="13" fill="#34d399">CSE Student</text>

    <rect x="465" y="185" width="150" height="30" rx="15" fill="#1e293b" stroke="#818cf8" stroke-width="1"/>
    <text x="540" y="205" text-anchor="middle" font-family="Fira Code, monospace" font-size="13" fill="#818cf8">Dhaka, Bangladesh</text>

    <rect x="630" y="185" width="140" height="30" rx="15" fill="#1e293b" stroke="#34d399" stroke-width="1" class="pulse"/>
    <text x="700" y="205" text-anchor="middle" font-family="Fira Code, monospace" font-size="13" fill="#34d399">Open to Work</text>
  </g>

  <!-- bottom wave -->
  <path d="M0,260 C250,200 750,200 1000,260 L1000,260 L0,260 Z" fill="#020617" opacity="0.6"/>
</svg>
